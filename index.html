<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Javier Montes · Desarrollador Fullstack</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <canvas id="bg-canvas" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>
  <nav>
    <div class="container">
      <a class="nav-logo" href="#">jmontesv</a>
      <ul class="nav-links">
        <li><a href="#experiencia">Experiencia</a></li>
        <li><a href="#proyectos">Proyectos</a></li>
        <li><a href="#habilidades">Habilidades</a></li>
        <li><a href="#educacion">Educación</a></li>
        <li><a href="#contacto">Contacto</a></li>
      </ul>
    </div>
  </nav>

  <main class="container">

    <section id="hero">
      <p class="hero-label">// disponible para nuevas oportunidades</p>
      <h1 id="hero-name">Cargando…</h1>
      <p class="hero-bio" id="hero-bio"></p>
      <div class="hero-links" id="hero-links"></div>
    </section>

    <section id="experiencia">
      <p class="section-label">// experiencia profesional</p>
      <div id="exp-list"></div>
    </section>

    <section id="proyectos">
      <p class="section-label">// proyectos</p>
      <div class="project-grid" id="project-grid"></div>
    </section>

    <section id="habilidades">
      <p class="section-label">// habilidades</p>
      <div class="skills-grid" id="skills-grid"></div>
    </section>

    <section id="educacion">
      <p class="section-label">// educación</p>
      <div id="edu-list"></div>
    </section>

    <section id="contacto">
      <p class="section-label">// contacto</p>
      <div class="contact-grid" id="contact-grid"></div>
    </section>

  </main>

  <footer>
    <span>Última actualización: <span id="last-updated"></span></span>
  </footer>

  <script type="text/javascript" src="js/script.js"></script>
  <script type="text/javascript" src="js/particles.js"></script>
</body>
</html>
